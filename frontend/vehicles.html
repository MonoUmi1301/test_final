<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vehicles — Fleet OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="fleet.css"/>
  <script src="api.js"></script>
  <script src="nav.js"></script>
</head>
<body>
<script>
  if (!requireAuth()) throw new Error();
  renderNav('vehicles');
</script>

<div class="page-body fade-in">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
    <div>
      <h1 style="font-size:22px;font-weight:700;letter-spacing:-0.5px;color:var(--apple-text-primary);">Vehicles</h1>
      <p class="text-tertiary" style="font-size:13px;margin-top:2px;" id="vehicle-count">Loading…</p>
    </div>
    <button class="btn btn-primary" id="create-btn" onclick="openCreateModal()" style="display:none;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Vehicle
    </button>
  </div>

  <div class="filter-bar" style="margin-bottom:16px;">
    <div class="search-wrap" style="flex:1;max-width:280px;">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="search-input" placeholder="Search plate, brand, driver…" oninput="onSearchInput()"/>
    </div>

    <div class="chip-group" id="status-chips">
      <button class="chip active" data-val="" onclick="setFilter('status','',this)">All</button>
      <button class="chip" data-val="ACTIVE"      onclick="setFilter('status','ACTIVE',this)">Active</button>
      <button class="chip" data-val="IDLE"        onclick="setFilter('status','IDLE',this)">Idle</button>
      <button class="chip" data-val="MAINTENANCE" onclick="setFilter('status','MAINTENANCE',this)">Maintenance</button>
      <button class="chip" data-val="RETIRED"     onclick="setFilter('status','RETIRED',this)">Retired</button>
    </div>

    <div class="chip-group" id="type-chips">
      <button class="chip active" data-val="" onclick="setFilter('type','',this)">All Types</button>
      <button class="chip" data-val="TRUCK"      onclick="setFilter('type','TRUCK',this)">Truck</button>
      <button class="chip" data-val="VAN"        onclick="setFilter('type','VAN',this)">Van</button>
      <button class="chip" data-val="MOTORCYCLE" onclick="setFilter('type','MOTORCYCLE',this)">Motorcycle</button>
      <button class="chip" data-val="PICKUP"     onclick="setFilter('type','PICKUP',this)">Pickup</button>
    </div>
  </div>

  <div class="card" style="overflow:hidden;">
    <div class="list-header" style="grid-template-columns:1.2fr 90px 110px 90px 150px 130px 80px;">
      <div class="list-th">Vehicle</div>
      <div class="list-th">Type</div>
      <div class="list-th">Status</div>
      <div class="list-th">Mileage</div>
      <div class="list-th">Driver</div>
      <div class="list-th">Next Service</div>
      <div class="list-th"></div>
    </div>
    <div id="vehicle-table">
      <div class="empty-state"><p class="empty-state-text">Loading vehicles…</p></div>
    </div>
  </div>
</div>

<div id="modal" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">Add Vehicle</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div id="toast-stack" class="toast-stack"></div>

<script>
let allVehicles = [];
let filters = { status: '', type: '', q: '' };
const user = getUser();

if (user?.role === 'ADMIN') document.getElementById('create-btn').style.display = 'flex';

// 1. ฟังก์ชันดึงค่าจาก URL มาใส่ในตัวแปร filters และ UI (ข้อ 6: Restore on reload)
function restoreFiltersFromURL() {
  const p = new URLSearchParams(window.location.search);
  
  // Restore status
  filters.status = p.get('status') || '';
  document.querySelectorAll('#status-chips .chip').forEach(btn =>
    btn.classList.toggle('active', btn.dataset.val === filters.status)
  );

  // Restore type
  filters.type = p.get('type') || '';
  document.querySelectorAll('#type-chips .chip').forEach(btn =>
    btn.classList.toggle('active', btn.dataset.val === filters.type)
  );

  // Restore search query
  filters.q = p.get('q') || '';
  document.getElementById('search-input').value = filters.q;
}

// 2. ฟังก์ชันอัปเดต URL ให้ตรงกับ Filter ปัจจุบัน (ข้อ 6: Reflect in URL)
function updateURL() {
  const p = new URLSearchParams();
  if (filters.status) p.set('status', filters.status);
  if (filters.type)   p.set('type', filters.type);
  if (filters.q)      p.set('q', filters.q);
  
  // ใช้ replaceState เพื่อไม่ให้รก history ของ browser
  const newUrl = window.location.pathname + (p.toString() ? '?' + p.toString() : '');
  history.replaceState({}, '', newUrl);
}

function setFilter(key, value, btn) {
  filters[key] = value;
  btn.closest('.chip-group').querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function onSearchInput() {
  filters.q = document.getElementById('search-input').value.trim().toLowerCase();
  applyFilters();
}

function applyFilters() {
  updateURL(); // อัปเดต URL ทุกครั้งที่เปลี่ยน Filter
  
  const start = performance.now();
  const filtered = allVehicles.filter(v => {
    if (filters.status && v.status !== filters.status) return false;
    if (filters.type   && v.type   !== filters.type)   return false;
    if (filters.q) {
      const s = `${v.license_plate} ${v.brand||''} ${v.model||''} ${v.driver_name||''}`.toLowerCase();
      if (!s.includes(filters.q)) return false;
    }
    return true;
  });
  
  renderTable(filtered);
  
  const ms = performance.now() - start;
  if (ms > 100) console.warn(`Filter took ${ms.toFixed(1)}ms`); // ตรวจสอบประสิทธิภาพตามข้อ 2.4
}

async function loadVehicles() {
  try {
    allVehicles = await api.getJSON('/vehicles');
    document.getElementById('vehicle-count').textContent = `${allVehicles.length} vehicles total`;
    restoreFiltersFromURL(); // เรียกใช้ตอนโหลดหน้า
    applyFilters();
  } catch { toast('Failed to load vehicles', 'error'); }
}

const VALID_TRANSITIONS = { IDLE: ['ACTIVE','MAINTENANCE'], ACTIVE: ['IDLE','MAINTENANCE'], MAINTENANCE: ['IDLE'], RETIRED: [] };

function renderTable(vehicles) {
  const el = document.getElementById('vehicle-table');
  if (!vehicles.length) {
    el.innerHTML = '<div class="empty-state"><p class="empty-state-text">No vehicles match your filters</p></div>';
    return;
  }
  el.innerHTML = vehicles.map(v => {
    const svcPct = v.next_service_km ? Math.min(100, Math.round((v.mileage_km / v.next_service_km) * 100)) : 0;
    const svcFill = svcPct >= 100 ? 'red' : svcPct >= 80 ? 'orange' : 'green';
    return `
      <div class="list-row" style="grid-template-columns:1.2fr 90px 110px 90px 150px 130px 80px;" onclick="openDetail('${v.id}')">
        <div>
          <div class="mono" style="font-size:13px;font-weight:500;color:var(--apple-text-primary);">${v.license_plate}</div>
          <div style="font-size:11px;color:var(--apple-text-tertiary);margin-top:1px;">${[v.brand,v.model,v.year].filter(Boolean).join(' ') || '—'}</div>
        </div>
        <div><span class="badge badge-neutral">${v.type}</span></div>
        <div>${badge(v.status)}</div>
        <div class="mono-sm text-secondary">${(v.mileage_km||0).toLocaleString()}</div>
        <div style="font-size:13px;color:var(--apple-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${v.driver_name || '—'}</div>
        <div>
          ${v.next_service_km ? `
            <div class="mono-sm text-secondary" style="margin-bottom:4px;">${v.next_service_km.toLocaleString()} km</div>
            <div class="progress-wrap" style="width:80px;">
              <div class="progress-fill ${svcFill}" style="width:${svcPct}%;"></div>
            </div>
          ` : '<span style="font-size:13px;color:var(--apple-text-tertiary);">—</span>'}
        </div>
        <div style="display:flex;gap:6px;justify-content:flex-end;" onclick="event.stopPropagation()">
          <button class="btn-icon" onclick="openDetail('${v.id}')" title="Details">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
          ${user?.role === 'ADMIN' ? `
          <button class="btn-icon" onclick="openEditModal('${v.id}')" title="Edit">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function openDetail(id) {
  const v = allVehicles.find(x => x.id === id);
  if (!v) return;
  const allowed = VALID_TRANSITIONS[v.status] || [];
  document.getElementById('modal-title').textContent = v.license_plate;
  document.getElementById('modal-body').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
      ${[
        ['Type', v.type],
        ['Status', badge(v.status)],
        ['Brand / Model', [v.brand,v.model,v.year].filter(Boolean).join(' ') || '—'],
        ['Fuel Type', v.fuel_type || '—'],
        ['Mileage', fmt.km(v.mileage_km)],
        ['Next Service', fmt.km(v.next_service_km)],
        ['Driver', v.driver_name || '—'],
      ].map(([k,val]) => `
        <div>
          <div class="section-label" style="margin-bottom:3px;">${k}</div>
          <div style="font-size:13px;font-weight:500;color:var(--apple-text-primary);">${val}</div>
        </div>
      `).join('')}
    </div>

    ${user?.role === 'ADMIN' ? `
      <div class="divider"></div>
      <div class="section-label" style="margin-bottom:8px;">Status Transition</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;">
        ${allowed.length
          ? allowed.map(s => `<button class="trans-btn" onclick="changeStatus('${v.id}','${s}',this)">→ ${s}</button>`).join('')
          : `<span style="font-size:12px;color:var(--apple-text-tertiary);">No transitions from ${v.status}</span>`
        }
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost btn-sm" onclick="openEditModal('${v.id}');closeModal()">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteVehicle('${v.id}')">Delete</button>
      </div>
    ` : ''}
  `;
  document.getElementById('modal').classList.remove('hidden');
}

async function changeStatus(id, newStatus, btn) {
  btn.disabled = true; btn.textContent = '…';
  try {
    await api.patchJSON(`/vehicles/${id}`, { status: newStatus });
    toast(`Status changed to ${newStatus}`);
    closeModal();
    await loadVehicles();
  } catch (err) {
    const allowed = err.details?.allowed_transitions;
    const msg = allowed?.length
      ? `${err.message} — Allowed: ${allowed.join(', ')}`
      : err.message;
    toast(msg, 'error');
    btn.disabled = false; btn.textContent = `→ ${newStatus}`;
  }
}

async function deleteVehicle(id) {
  if (!confirm('Delete this vehicle? This cannot be undone.')) return;
  try {
    await api.deleteJSON(`/vehicles/${id}`);
    toast('Vehicle deleted');
    closeModal();
    await loadVehicles();
  } catch (err) { toast(err.message, 'error'); }
}

function openCreateModal() {
  document.getElementById('modal-title').textContent = 'Add Vehicle';
  document.getElementById('modal-body').innerHTML = vehicleForm(null);
  document.getElementById('modal').classList.remove('hidden');
}

function openEditModal(id) {
  const v = allVehicles.find(x => x.id === id);
  document.getElementById('modal-title').textContent = 'Edit Vehicle';
  document.getElementById('modal-body').innerHTML = vehicleForm(v);
  document.getElementById('modal').classList.remove('hidden');
}

function vehicleForm(v) {
  return `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="form-group">
        <label class="form-label">License Plate *</label>
        <input id="f-plate" class="form-input" value="${v?.license_plate||''}" placeholder="กข-1234"/>
      </div>
      <div class="form-group">
        <label class="form-label">Type *</label>
        <select id="f-type" class="form-input form-select">
          ${['TRUCK','VAN','MOTORCYCLE','PICKUP'].map(t=>`<option value="${t}" ${v?.type===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Brand</label>
        <input id="f-brand" class="form-input" value="${v?.brand||''}" placeholder="Isuzu"/>
      </div>
      <div class="form-group">
        <label class="form-label">Model</label>
        <input id="f-model" class="form-input" value="${v?.model||''}" placeholder="D-Max"/>
      </div>
      <div class="form-group">
        <label class="form-label">Year</label>
        <input id="f-year" type="number" class="form-input" value="${v?.year||''}" placeholder="2022"/>
      </div>
      <div class="form-group">
        <label class="form-label">Fuel Type</label>
        <select id="f-fuel" class="form-input form-select">
          <option value="">—</option>
          ${['DIESEL','GASOLINE','ELECTRIC','HYBRID'].map(t=>`<option value="${t}" ${v?.fuel_type===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Mileage (km)</label>
        <input id="f-mileage" type="number" class="form-input" value="${v?.mileage_km||0}"/>
      </div>
      <div class="form-group">
        <label class="form-label">Next Service (km)</label>
        <input id="f-next-svc" type="number" class="form-input" value="${v?.next_service_km||''}"/>
      </div>
    </div>
    <div id="form-error" class="form-error hidden"></div>
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button onclick="closeModal()" class="btn btn-ghost btn-full">Cancel</button>
      <button onclick="submitVehicle('${v?.id||''}')" class="btn btn-primary btn-full">${v ? 'Save Changes' : 'Create Vehicle'}</button>
    </div>
  `;
}

async function submitVehicle(id) {
  const body = {
    license_plate: document.getElementById('f-plate').value.trim(),
    type:          document.getElementById('f-type').value,
    brand:         document.getElementById('f-brand').value.trim() || undefined,
    model:         document.getElementById('f-model').value.trim() || undefined,
    year:          document.getElementById('f-year').value ? parseInt(document.getElementById('f-year').value) : undefined,
    fuel_type:     document.getElementById('f-fuel').value || undefined,
    mileage_km:    parseInt(document.getElementById('f-mileage').value) || 0,
    next_service_km: document.getElementById('f-next-svc').value ? parseInt(document.getElementById('f-next-svc').value) : undefined,
  };
  const errEl = document.getElementById('form-error');
  try {
    if (id) await api.patchJSON(`/vehicles/${id}`, body);
    else    await api.postJSON('/vehicles', body);
    toast(id ? 'Vehicle updated' : 'Vehicle created');
    closeModal();
    await loadVehicles();
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
  }
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

loadVehicles();
</script>
</body>
</html>
