<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Fleet OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="fleet.css"/>
  <script src="api.js"></script>
  <script src="nav.js"></script>
</head>
<body>
<script>
  if (!requireAuth()) throw new Error();
  renderNav('dashboard');
</script>

<div class="page-body fade-in">
  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
    <div>
      <h1 style="font-size:22px;font-weight:700;letter-spacing:-0.5px;color:var(--apple-text-primary);">Dashboard</h1>
      <p class="text-tertiary" style="font-size:13px;margin-top:2px;" id="last-updated">Loading…</p>
    </div>
  </div>

  <!-- Metrics -->
  <div class="grid-metrics" style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;" id="metrics-grid">
    <div class="metric-card skeleton" style="height:110px;"></div>
    <div class="metric-card skeleton" style="height:110px;"></div>
    <div class="metric-card skeleton" style="height:110px;"></div>
    <div class="metric-card skeleton" style="height:110px;"></div>
  </div>

  <!-- Charts row -->
  <div style="display:grid;grid-template-columns:280px 1fr;gap:14px;margin-bottom:20px;">
    <div class="chart-card">
      <div class="chart-title">Vehicles by Status</div>
      <div style="height:180px;display:flex;align-items:center;justify-content:center;">
        <canvas id="donut-chart"></canvas>
      </div>
      <div id="donut-legend" style="margin-top:12px;display:flex;flex-direction:column;gap:6px;"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Trip Distance — Last 7 Days</div>
      <div style="height:220px;">
        <canvas id="line-chart"></canvas>
      </div>
    </div>
  </div>

  <!-- Bottom row -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
    <!-- Active trips -->
    <div class="card">
      <div class="card-header">
        <span class="section-label">Active Trips</span>
        <a href="trips.html?status=IN_PROGRESS" style="font-size:12px;font-weight:500;color:var(--apple-blue);">View all</a>
      </div>
      <div style="padding:12px 0;" id="active-trips-list">
        <div class="skeleton" style="height:52px;border-radius:10px;margin:0 16px 8px;"></div>
        <div class="skeleton" style="height:52px;border-radius:10px;margin:0 16px;"></div>
      </div>
    </div>

    <!-- Alerts -->
    <div class="card">
      <div class="card-header">
        <span class="section-label">Alerts</span>
        <span id="alert-count" style="font-size:11px;font-weight:600;color:var(--apple-red);background:var(--apple-red-dim);padding:2px 8px;border-radius:99px;"></span>
      </div>
      <div style="padding:12px 16px;" id="alerts-list">
        <div class="skeleton" style="height:48px;border-radius:10px;margin-bottom:8px;"></div>
        <div class="skeleton" style="height:48px;border-radius:10px;"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast-stack" class="toast-stack"></div>

<script>
const STATUS_PALETTE = {
  ACTIVE: '#34C759', IDLE: '#98989D', MAINTENANCE: '#FF9500', RETIRED: '#FF3B30',
};

let donutChart, lineChart;

async function loadDashboard() {
  try {
    const [metrics, byStatus, trend, activeTrips, alerts] = await Promise.all([
      api.getJSON('/dashboard/metrics'),
      api.getJSON('/dashboard/vehicles-by-status'),
      api.getJSON('/dashboard/trip-distance-trend'),
      api.getJSON('/dashboard/active-trips'),
      api.getJSON('/alerts'),
    ]);
    renderMetrics(metrics);
    renderDonut(byStatus);
    renderLine(trend);
    renderActiveTrips(activeTrips);
    renderAlerts(alerts);
    document.getElementById('last-updated').textContent = 'Updated ' + fmt.datetime(new Date());
  } catch (err) {
    console.error(err);
    toast('Failed to load dashboard data', 'error');
  }
}

function renderMetrics(m) {
  const cards = [
    { label: 'Total Vehicles',       value: m.total_vehicles,        icon: `<rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>`, color: 'var(--apple-blue)',   href: 'vehicles.html' },
    { label: 'Active Trips Today',   value: m.active_trips_today,    icon: `<circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>`, color: 'var(--apple-green)',  href: 'trips.html?status=IN_PROGRESS' },
    { label: 'Distance Today',       value: fmt.km(m.total_distance_today), icon: `<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>`, color: 'var(--apple-purple)', href: 'trips.html', raw: true },
    { label: 'Overdue Maintenance',  value: m.maintenance_overdue,   icon: `<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>`, color: 'var(--apple-red)',    href: 'maintenance.html?status=OVERDUE', danger: true },
  ];

  document.getElementById('metrics-grid').innerHTML = cards.map(c => `
    <div class="metric-card" onclick="window.location.href='${c.href}'">
      <div class="metric-icon-wrap" style="background:${c.color}1A;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${c.color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${c.icon}</svg>
      </div>
      <div class="metric-value" style="${c.danger && c.value > 0 ? 'color:var(--apple-red);' : ''}">${c.raw ? c.value : (c.value ?? 0).toLocaleString()}</div>
      <div class="metric-label">${c.label}</div>
    </div>
  `).join('');
}

function renderDonut(data) {
  const colors = data.map(d => STATUS_PALETTE[d.status] || '#98989D');
  if (donutChart) donutChart.destroy();
  donutChart = new Chart(document.getElementById('donut-chart'), {
    type: 'doughnut',
    data: { labels: data.map(d => d.status), datasets: [{ data: data.map(d => d.count), backgroundColor: colors, borderWidth: 0, hoverOffset: 6 }] },
    options: {
      cutout: '72%',
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.parsed}` } } },
    },
  });

  document.getElementById('donut-legend').innerHTML = data.map((d, i) => `
    <div style="display:flex;align-items:center;justify-content:space-between;font-size:12px;">
      <div style="display:flex;align-items:center;gap:7px;">
        <div style="width:7px;height:7px;border-radius:50%;background:${colors[i]};flex-shrink:0;"></div>
        <span class="text-secondary">${d.status}</span>
      </div>
      <span style="font-weight:600;color:var(--apple-text-primary);">${d.count}</span>
    </div>
  `).join('');
}

function renderLine(data) {
  const isDark = document.documentElement.classList.contains('dark');
  const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
  const tickColor = 'var(--apple-text-tertiary)';

  if (lineChart) lineChart.destroy();
  lineChart = new Chart(document.getElementById('line-chart'), {
    type: 'bar',
    data: {
      labels: data.map(d => { const [,m,day] = d.date.split('-'); return `${day}/${m}`; }),
      datasets: [
        {
          label: 'Distance (km)',
          data: data.map(d => d.total_distance),
          backgroundColor: 'rgba(0,113,227,0.12)',
          borderColor: '#0071E3',
          borderWidth: 1.5,
          borderRadius: 5,
          type: 'bar',
        },
        {
          label: 'Trips',
          data: data.map(d => d.trip_count),
          borderColor: '#34C759',
          backgroundColor: 'transparent',
          borderWidth: 1.5,
          tension: 0.4,
          type: 'line',
          yAxisID: 'y2',
          pointRadius: 3,
          pointBackgroundColor: '#34C759',
        },
      ],
    },
    options: {
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { color: tickColor, font: { size: 11, family: 'Inter' } } },
        y: { grid: { color: gridColor }, ticks: { color: tickColor, font: { size: 11, family: 'Inter' } }, beginAtZero: true },
        y2: { position: 'right', grid: { display: false }, ticks: { color: tickColor, font: { size: 11, family: 'Inter' } }, beginAtZero: true },
      },
    },
  });
}

function renderActiveTrips(trips) {
  const el = document.getElementById('active-trips-list');
  if (!trips.length) {
    el.innerHTML = '<div class="empty-state"><p class="empty-state-text">No active trips</p></div>';
    return;
  }
  el.innerHTML = trips.slice(0, 5).map(t => `
    <a href="trips.html" style="display:flex;align-items:center;gap:12px;padding:10px 16px;transition:background var(--duration-fast);border-radius:0;text-decoration:none;" onmouseover="this.style.background='var(--apple-surface-2)'" onmouseout="this.style.background='transparent'">
      <div style="width:32px;height:32px;border-radius:8px;background:var(--apple-blue-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--apple-blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:500;color:var(--apple-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${t.license_plate} — ${t.driver_name || '—'}</div>
        <div style="font-size:11px;color:var(--apple-text-tertiary);">${t.origin} → ${t.destination}</div>
      </div>
      <div style="font-size:11px;color:var(--apple-text-tertiary);font-family:var(--font-mono);flex-shrink:0;">${fmt.km(t.distance_km)}</div>
    </a>
  `).join('');
}

function renderAlerts(alerts) {
  document.getElementById('alert-count').textContent = alerts.length;
  const el = document.getElementById('alerts-list');
  if (!alerts.length) {
    el.innerHTML = '<div class="empty-state"><p class="empty-state-text">No active alerts 🎉</p></div>';
    return;
  }
  el.innerHTML = alerts.slice(0, 5).map(a => `
    <div class="alert-item ${a.severity === 'CRITICAL' ? 'alert-critical' : 'alert-warning'}" style="margin-bottom:6px;">
      <div class="alert-dot ${a.severity}"></div>
      <div>
        <div class="alert-msg">${a.message}</div>
        <div class="alert-meta">${a.severity} · ${a.affected_resource_type}</div>
      </div>
    </div>
  `).join('');
}

loadDashboard();
setInterval(loadDashboard, 60000);
</script>
</body>
</html>
