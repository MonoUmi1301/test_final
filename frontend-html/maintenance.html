<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maintenance — Fleet OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="fleet.css"/>
  <script src="api.js"></script>
  <script src="nav.js"></script>
</head>
<body>
<script>
  if (!requireAuth()) throw new Error();
  renderNav('maintenance');
</script>

<div class="page-body fade-in">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
    <div>
      <h1 style="font-size:22px;font-weight:700;letter-spacing:-0.5px;color:var(--apple-text-primary);">Maintenance</h1>
      <p class="text-tertiary" style="font-size:13px;margin-top:2px;" id="maint-count">Loading…</p>
    </div>
    <button class="btn btn-primary" id="create-btn" onclick="openCreateModal()" style="display:none;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Schedule
    </button>
  </div>

  <div style="display:grid;grid-template-columns:1fr 280px;gap:16px;align-items:start;">
    <!-- Schedule -->
    <div>
      <div class="chip-group" style="margin-bottom:14px;display:inline-flex;">
        <button class="chip active" data-val="" onclick="filterMaint('',this)">All</button>
        <button class="chip" data-val="SCHEDULED"   onclick="filterMaint('SCHEDULED',this)">Scheduled</button>
        <button class="chip" data-val="IN_PROGRESS" onclick="filterMaint('IN_PROGRESS',this)">In Progress</button>
        <button class="chip" data-val="OVERDUE"     onclick="filterMaint('OVERDUE',this)">Overdue</button>
        <button class="chip" data-val="COMPLETED"   onclick="filterMaint('COMPLETED',this)">Completed</button>
      </div>

      <div class="card" style="overflow:hidden;">
        <div class="list-header" style="grid-template-columns:1fr 90px 120px 120px 100px 60px;">
          <div class="list-th">Vehicle / Type</div>
          <div class="list-th">Status</div>
          <div class="list-th">Scheduled</div>
          <div class="list-th">Technician</div>
          <div class="list-th">Cost</div>
          <div class="list-th"></div>
        </div>
        <div id="maint-table">
          <div class="empty-state"><p class="empty-state-text">Loading…</p></div>
        </div>
      </div>
    </div>

    <!-- Alerts panel -->
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <span class="section-label">Alerts</span>
        <span id="alert-badge" style="font-size:11px;font-weight:600;color:var(--apple-red);background:var(--apple-red-dim);padding:2px 8px;border-radius:99px;"></span>
      </div>
      <div id="alerts-panel">
        <div class="skeleton" style="height:60px;border-radius:10px;margin-bottom:8px;"></div>
        <div class="skeleton" style="height:60px;border-radius:10px;"></div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="modal" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">Maintenance Detail</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div id="toast-stack" class="toast-stack"></div>

<script>
let allMaint = [];
let filterStatus = '';
const user = getUser();
const now = new Date();

if (user?.role === 'ADMIN') document.getElementById('create-btn').style.display = 'flex';

const urlP = new URLSearchParams(window.location.search);
if (urlP.get('status')) {
  filterStatus = urlP.get('status');
  document.querySelectorAll('.chip-group .chip').forEach(b =>
    b.classList.toggle('active', b.dataset.val === filterStatus)
  );
}

function filterMaint(status, btn) {
  filterStatus = status;
  btn.closest('.chip-group').querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  history.replaceState({}, '', status ? `?status=${status}` : '?');
  renderTable();
}

async function loadAll() {
  try {
    const [maint, alerts] = await Promise.all([api.getJSON('/maintenance'), api.getJSON('/alerts')]);
    allMaint = maint;
    document.getElementById('maint-count').textContent = `${maint.length} maintenance records`;
    renderTable();
    renderAlerts(alerts);
  } catch { toast('Failed to load maintenance', 'error'); }
}

function getDueClass(m) {
  if (['COMPLETED','IN_PROGRESS'].includes(m.status)) return '';
  const diff = (new Date(m.scheduled_at) - now) / 86400000;
  if (diff < 0)   return 'overdue';
  if (diff <= 7)  return 'soon';
  return '';
}

function renderTable() {
  const filtered = filterStatus ? allMaint.filter(m => m.status === filterStatus) : allMaint;
  const el = document.getElementById('maint-table');
  if (!filtered.length) {
    el.innerHTML = '<div class="empty-state"><p class="empty-state-text">No records found</p></div>';
    return;
  }
  el.innerHTML = filtered.map(m => {
    const due = getDueClass(m);
    return `
      <div class="list-row" style="grid-template-columns:1fr 90px 120px 120px 100px 60px;" onclick="openDetail('${m.id}')">
        <div>
          <div class="mono" style="font-size:13px;font-weight:500;color:var(--apple-text-primary);">${m.license_plate || m.vehicle_id}</div>
          <div style="font-size:11px;color:var(--apple-text-tertiary);">${m.type.replace(/_/g,' ')}</div>
        </div>
        <div>
          ${due === 'overdue'
            ? '<span class="badge status-OVERDUE">OVERDUE</span>'
            : badge(m.status)}
        </div>
        <div style="font-size:13px;color:${due==='overdue'?'var(--apple-red)':due==='soon'?'var(--apple-orange)':'var(--apple-text-secondary)'};">
          ${fmt.date(m.scheduled_at)}
        </div>
        <div style="font-size:13px;color:var(--apple-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${m.technician||'—'}</div>
        <div style="font-size:13px;color:var(--apple-text-secondary);">${m.cost_thb ? fmt.thb(m.cost_thb) : '—'}</div>
        <div style="display:flex;justify-content:flex-end;">
          ${due === 'overdue' ? `<div style="width:7px;height:7px;border-radius:50%;background:var(--apple-red);"></div>` : ''}
          ${due === 'soon'    ? `<div style="width:7px;height:7px;border-radius:50%;background:var(--apple-orange);"></div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function renderAlerts(alerts) {
  document.getElementById('alert-badge').textContent = alerts.length || '';
  const el = document.getElementById('alerts-panel');
  if (!alerts.length) {
    el.innerHTML = '<div class="card" style="padding:16px;text-align:center;font-size:13px;color:var(--apple-text-tertiary);">No active alerts ✓</div>';
    return;
  }
  el.innerHTML = alerts.map(a => `
    <div class="alert-item ${a.severity === 'CRITICAL' ? 'alert-critical' : 'alert-warning'}" style="margin-bottom:6px;">
      <div class="alert-dot ${a.severity}"></div>
      <div>
        <div style="font-size:11px;font-weight:600;color:${a.severity==='CRITICAL'?'var(--apple-red)':'var(--apple-orange)'};">${a.severity} · ${a.affected_resource_type}</div>
        <div class="alert-msg" style="font-size:12px;margin-top:2px;">${a.message}</div>
      </div>
    </div>
  `).join('');
}

function openDetail(id) {
  const m = allMaint.find(x => x.id === id);
  if (!m) return;
  document.getElementById('modal-title').textContent = `${m.type.replace(/_/g,' ')} — ${m.license_plate || m.vehicle_id}`;
  document.getElementById('modal-body').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
      ${[
        ['Status',    badge(m.status)],
        ['Type',      m.type.replace(/_/g,' ')],
        ['Scheduled', fmt.datetime(m.scheduled_at)],
        ['Completed', fmt.datetime(m.completed_at)],
        ['Technician',m.technician || '—'],
        ['Cost',      m.cost_thb ? fmt.thb(m.cost_thb) : '—'],
      ].map(([k,v]) => `
        <div>
          <div class="section-label" style="margin-bottom:3px;">${k}</div>
          <div style="font-size:13px;font-weight:500;color:var(--apple-text-primary);">${v}</div>
        </div>
      `).join('')}
    </div>
    ${m.notes ? `<div style="background:var(--apple-surface-2);border-radius:var(--radius-sm);padding:12px;font-size:13px;color:var(--apple-text-secondary);margin-bottom:16px;">${m.notes}</div>` : ''}
    ${m.parts?.length ? `
      <div class="section-label" style="margin-bottom:8px;">Parts</div>
      <div class="card-sm" style="padding:0;overflow:hidden;margin-bottom:16px;">
        ${m.parts.map(p => `
          <div style="display:flex;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--apple-divider);font-size:13px;">
            <span>${p.part_name}</span>
            <span class="text-secondary">×${p.quantity} ${p.cost_thb ? '· ' + fmt.thb(p.cost_thb) : ''}</span>
          </div>
        `).join('')}
      </div>
    ` : ''}
    <div style="display:flex;gap:8px;">
      ${user?.role === 'ADMIN' && m.status !== 'COMPLETED'
        ? `<button onclick="markComplete('${m.id}')" class="btn btn-primary btn-full">Mark Completed</button>`
        : ''}
      <button onclick="closeModal()" class="btn btn-ghost btn-full">Close</button>
    </div>
  `;
  document.getElementById('modal').classList.remove('hidden');
}

async function markComplete(id) {
  try {
    await api.patchJSON(`/maintenance/${id}`, { status: 'COMPLETED' });
    toast('Maintenance marked as completed');
    closeModal();
    await loadAll();
  } catch (err) { toast(err.message, 'error'); }
}

function openCreateModal() {
  document.getElementById('modal-title').textContent = 'Schedule Maintenance';
  document.getElementById('modal-body').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div class="form-group">
        <label class="form-label">Vehicle *</label>
        <select id="f-vid" class="form-input form-select">
          <option value="">Select vehicle…</option>
        </select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label">Type *</label>
          <select id="f-type" class="form-input form-select">
            ${['OIL_CHANGE','TIRE','BRAKE','ENGINE','INSPECTION','REPAIR'].map(t=>`<option value="${t}">${t.replace(/_/g,' ')}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Scheduled At *</label>
          <input id="f-sched" type="datetime-local" class="form-input"/>
        </div>
        <div class="form-group">
          <label class="form-label">Technician</label>
          <input id="f-tech" class="form-input" placeholder="Name"/>
        </div>
        <div class="form-group">
          <label class="form-label">Cost (THB)</label>
          <input id="f-cost" type="number" class="form-input" placeholder="0.00"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea id="f-notes" class="form-input" rows="2" placeholder="Additional notes…"></textarea>
      </div>
      <div id="form-error" class="form-error hidden"></div>
      <div style="display:flex;gap:8px;">
        <button onclick="closeModal()" class="btn btn-ghost btn-full">Cancel</button>
        <button onclick="submitMaint()" class="btn btn-primary btn-full">Schedule</button>
      </div>
    </div>
  `;
  api.getJSON('/vehicles').then(vs => {
    const sel = document.getElementById('f-vid');
    vs.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.id;
      opt.textContent = `${v.license_plate} — ${v.type}`;
      sel.appendChild(opt);
    });
  });
  document.getElementById('modal').classList.remove('hidden');
}

async function submitMaint() {
  const body = {
    vehicle_id:   document.getElementById('f-vid').value,
    type:         document.getElementById('f-type').value,
    scheduled_at: document.getElementById('f-sched').value,
    technician:   document.getElementById('f-tech').value || undefined,
    cost_thb:     parseFloat(document.getElementById('f-cost').value) || undefined,
    notes:        document.getElementById('f-notes').value || undefined,
  };
  const errEl = document.getElementById('form-error');
  try {
    await api.postJSON('/maintenance', body);
    toast('Maintenance scheduled');
    closeModal();
    await loadAll();
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
  }
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

loadAll();
</script>
</body>
</html>
