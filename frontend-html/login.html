<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Fleet OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="fleet.css"/>
  <script src="api.js"></script>
</head>
<body>
<div class="auth-screen">
  <div class="auth-card">
    <div class="auth-logo-wrap">
      <div class="auth-logo-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="3" width="15" height="13" rx="2"/>
          <path d="M16 8h4l3 3v5h-7V8z"/>
          <circle cx="5.5" cy="18.5" r="2.5"/>
          <circle cx="18.5" cy="18.5" r="2.5"/>
        </svg>
      </div>
      <div class="auth-title">Fleet OS</div>
      <div class="auth-sub">Fleet Management Platform</div>
    </div>

    <div id="error-msg" class="form-error hidden" style="margin-bottom:16px;"></div>

    <div class="form-group">
      <label class="form-label">Username</label>
      <input id="username" type="text" class="form-input" placeholder="Enter username" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input id="password" type="password" class="form-input" placeholder="Enter password" autocomplete="current-password"/>
    </div>
    <button id="login-btn" class="btn btn-primary btn-lg btn-full" style="margin-top:8px;" onclick="doLogin()">
      Sign In
    </button>

    <p style="text-align:center;font-size:11px;color:var(--apple-text-tertiary);margin-top:20px;">
      Fleet OS v2.0 — Logistics Management
    </p>
  </div>
</div>

<div id="toast-stack" class="toast-stack"></div>

<script>
  // Check already logged in
  if (getToken()) window.location.href = 'dashboard.html';

  const urlP = new URLSearchParams(window.location.search);
  if (urlP.get('expired')) {
    document.getElementById('error-msg').textContent = 'Session expired. Please sign in again.';
    document.getElementById('error-msg').classList.remove('hidden');
  }

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn  = document.getElementById('login-btn');
    const errEl = document.getElementById('error-msg');
    errEl.classList.add('hidden');

    if (!username || !password) {
      errEl.textContent = 'Please enter username and password.';
      errEl.classList.remove('hidden');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
      const res  = await fetch(`${FLEET_API_URL}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const json = await res.json();

      if (!res.ok) {
        errEl.textContent = json.error?.message || 'Login failed';
        errEl.classList.remove('hidden');
        return;
      }

      // บันทึกข้อมูล Token และ User
      sessionStorage.setItem('accessToken',  json.data.accessToken);
      sessionStorage.setItem('refreshToken', json.data.refreshToken);
      sessionStorage.setItem('user', JSON.stringify(json.data.user));

      // ✅ ตั้งค่าเวลาหมดอายุ 7 วัน (ตามอายุ Refresh Token ในบรีฟ 1.1)
      const expiresIn = 7 * 24 * 60 * 60 * 1000; 
      sessionStorage.setItem('expiresAt', (Date.now() + expiresIn).toString());

      window.location.href = './dashboard.html';
    } catch (e) {
      errEl.textContent = 'Cannot connect to server. Check your connection.';
      errEl.classList.remove('hidden');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
